name: Visual Lock

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  visual-lock:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-ms-playwright-${{ hashFiles('package-lock.json', 'pnpm-lock.yaml', 'yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-ms-playwright-

      - name: Install Playwright browsers (chromium)
        run: npx playwright install --with-deps chromium

      - name: Build (sanity)
        run: npm run -s build

      # MF_LINUX_SNAPSHOT_GUARD_V1
      - name: Guard (Linux baselines must exist)
        if: runner.os == Linux
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(tests/visual/screens.visual.spec.ts-snapshots/*-linux.png)
          if [ ${#files[@]} -eq 0 ]; then
            echo "❌ Visual Lock: não encontrei snapshots linux (*-linux.png)."
            echo "➡️ Rode o workflow manual: Visual Baseline (Linux) (visual-baseline-linux.yml)"
            echo "➡️ Ele gera + commita os baselines linux no mesmo branch do PR."
            exit 1
          fi
          echo "✅ Linux baselines presentes: ${#files[@]} arquivo(s)."

      - name: Run Visual Lock (validate only)
        env:
          CI: "true"
        run: npx playwright test -c playwright.visual.config.ts --workers=1 --retries=1

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-visual-artifacts
          path: |
            test-results/**
            playwright-report/**
          if-no-files-found: ignore
